services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: second-cervel-app
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: second_cervel
      DB_USERNAME: second_cervel
      DB_PASSWORD: second_cervel
      FILESYSTEM_DISK: local
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_KEY: local_master_key
    volumes:
      - ./:/var/www/html
      - app_vendor:/var/www/html/vendor
      - uploaded_files:/var/www/html/storage/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started
      tika:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: second-cervel-worker
    command: ["php", "artisan", "queue:work", "database", "--queue=indexing,default", "--sleep=2", "--tries=3"]
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: second_cervel
      DB_USERNAME: second_cervel
      DB_PASSWORD: second_cervel
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: local
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_KEY: local_master_key
      TIKA_URL: http://tika:9998
      SCOUT_DRIVER: meilisearch
    volumes:
      - ./:/var/www/html
      - app_vendor:/var/www/html/vendor
      - uploaded_files:/var/www/html/storage/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started
      tika:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: second-cervel-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: second_cervel
      POSTGRES_USER: second_cervel
      POSTGRES_PASSWORD: second_cervel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U second_cervel -d second_cervel"]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.13
    container_name: second-cervel-meilisearch
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: local_master_key
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data

  tika:
    image: apache/tika:2.9.2.1
    container_name: second-cervel-tika
    ports:
      - "9998:9998"

volumes:
  postgres_data:
  meilisearch_data:
  app_vendor:
  uploaded_files:
