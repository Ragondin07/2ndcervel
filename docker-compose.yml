services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: second-cervel-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./:/var/www/html
      - app_vendor:/var/www/html/vendor
      - uploaded_files:/var/www/html/storage/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started
      tika:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: second-cervel-worker
    restart: unless-stopped
    stop_grace_period: 30s
    command: ["php", "artisan", "queue:work", "database", "--queue=indexing,default", "--sleep=2", "--tries=3", "--timeout=90"]
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
      - app_vendor:/var/www/html/vendor
      - uploaded_files:/var/www/html/storage/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started
      tika:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: second-cervel-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-second_cervel}
      POSTGRES_USER: ${DB_USERNAME:-second_cervel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-second_cervel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.13
    container_name: second-cervel-meilisearch
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MEILISEARCH_HOST_PORT:-7700}:7700"
    environment:
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-local_master_key}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data

  tika:
    image: apache/tika:2.9.2.1
    container_name: second-cervel-tika
    restart: unless-stopped
    ports:
      - "127.0.0.1:${TIKA_HOST_PORT:-9998}:9998"

volumes:
  postgres_data:
  meilisearch_data:
  app_vendor:
  uploaded_files:
